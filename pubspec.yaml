name: super_fitness
description: "A cross-platform fitness tracking app with neumorphic design."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  sqflite: ^2.3.2
  path_provider: ^2.1.2

  # GPS定位
  geolocator: ^13.0.1
  geolocator_android: ^4.5.0
  latlong2: ^0.9.0

  # 路由管理
  go_router: ^13.2.0

  # 工具库
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.3.0

  # 图表
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
